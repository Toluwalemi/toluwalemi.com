<footer class="footer">
  <div class="footer__inner">
    {{ if $.Site.Copyright }}
      <div class="copyright copyright--user">{{ $.Site.Copyright | safeHTML }}</div>
    {{else}}
      <a href="/">Toluwalemi</a>
      <div class="copyright">
        <span>© {{ now.Year }} Toluwalemi</span>
        <a class="social-link" href="https://x.com/toluwalemi" aria-label="Toluwalemi on X">X</a>
        <a class="social-link" href="https://www.linkedin.com/in/toluwalemioluwadare/" aria-label="Toluwalemi on LinkedIn">LinkedIn</a>
        <a class="social-link" href="https://github.com/Toluwalemi" aria-label="Toluwalemi on GitHub">GitHub</a>
      </div>
    {{end}}
  </div>
</footer>

<script src="{{ "assets/main.js" | absURL }}"></script>
<script src="{{ "assets/prism.js" | absURL }}"></script>
{{- partial "extended_footer.html" . }}
