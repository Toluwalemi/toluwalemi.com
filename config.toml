baseurl = "/"
languageCode = "en-us"
theme = "hello-friend"
paginate = 10

[params]
  # dir name of your blog content (default is `content/posts`)
  contentTypeName = "blog"
  keywords = "Toluwalemi, Toluwalemi Oluwadare, Software Engineer, Backend Engineer, AI Engineer, Python Developer, Django, AWS, DevOps"

  # "light" or "dark"
  defaultTheme = "light"

  # if you set this to 0, only submenu trigger will be visible
  showMenuItems = 3

  # Show reading time in minutes for posts
  showReadingTime = true

  # Show table of contents at the top of your posts (defaults to false)
  # Alternatively, add this param to post front matter for specific posts
  # toc = true

  # Show full page content in RSS feed items
  #(default is Description or Summary metadata in the front matter)
  # rssFullText = true

[permalinks]
  blog = "blog/:title/"

[taxonomies]
   tag = "tags"

[languages]
  [languages.en]
    title = "Toluwalemi"
    subtitle = "Software Engineer and Backend Engineer specializing in Python, Django, AWS, and AI Engineering"
    keywords = "Toluwalemi, Toluwalemi Oluwadare, Software Engineer, Backend Engineer, AI Engineer, Python, Django, AWS, DevOps, RAG, LLMs"
    copyright = ""
    menuMore = "Show more"
    writtenBy = ""
    readMore = "Read more"
    readOtherPosts = "Read other posts"
    newerPosts = "Newer posts"
    olderPosts = "Older posts"
    minuteReadingTime = "min read"
    dateFormatSingle = "2006-01-02"
    dateFormatList = "2006-01-02"
    # leave empty to disable, enter display text to enable
    lastModDisplay = "Last Updated:"

    [languages.en.params.logo]
      logoText = "Toluwalemi"
      logoHomeLink = "/"
    # or
    #
    # path = "/img/your-example-logo.svg"
    # alt = "Your example logo alt text"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "blog"
        name = "Blog"
        url = "/blog/"
      [[languages.en.menu.main]]
        identifier = "reading"
        name = "Reading"
        url = "/reading/"
      [[languages.en.menu.main]]
        identifier = "projects"
        name = "Projects"
        url = "/projects/"
